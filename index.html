<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#00d4aa"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SalaryFlow"/>
<link rel="manifest" href="manifest.json"/>
<title>SalaryFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--card:#15181f;--border:#1e2230;
  --accent:#00d4aa;--text:#e8eaf0;--text2:#7b8098;--text3:#4a4e63;
  --green:#00d4aa;--red:#ff6b6b;--blue:#0099ff;--yellow:#ffd93d;--purple:#a29bfe;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.header{padding:14px 20px 10px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.header-title{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.header-sub{font-size:10px;color:var(--text2);margin-top:1px;font-family:var(--mono)}
.month-selector{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px}
.month-selector span{font-size:11px;font-family:var(--mono);color:var(--text);font-weight:700}
.month-selector button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.month-selector button:active{color:var(--accent)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 76px;scroll-behavior:smooth}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:8px 0 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text3);transition:color 0.2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8}
.nav-btn span{font-size:8px;font-family:var(--mono);letter-spacing:0.3px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:10px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.card-action{background:none;border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:4px 10px;font-size:10px;font-family:var(--mono);cursor:pointer;transition:all 0.2s}
.card-action:active{background:var(--accent);color:#000}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.stat-label{font-size:9px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.stat-value{font-size:20px;font-family:var(--mono);font-weight:700;line-height:1}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}.stat-value.yellow{color:var(--yellow)}.stat-value.purple{color:var(--purple)}
.stat-sub{font-size:9px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.hero-card{border-radius:var(--radius);padding:18px;margin-bottom:10px;position:relative;overflow:hidden}
.hero-card.green-hero{background:linear-gradient(135deg,#001a14,#002a20);border:1px solid #00d4aa33}
.hero-card.purple-hero{background:linear-gradient(135deg,#0e0a1f,#1a1030);border:1px solid #a29bfe33}
.hero-card.blue-hero{background:linear-gradient(135deg,#001226,#001f3f);border:1px solid #0099ff33}
.hero-card.red-hero{background:linear-gradient(135deg,#1a0a0a,#2a1010);border:1px solid #ff6b6b33}
.hero-glow{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;pointer-events:none}
.hero-label{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;opacity:.6}
.hero-amount{font-size:32px;font-family:var(--mono);font-weight:700;line-height:1;margin-bottom:5px}
.hero-meta{font-size:10px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap}
.progress-wrap{margin-top:8px}
.progress-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text2);margin-bottom:3px;font-family:var(--mono)}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.list-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.li-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-right:10px}
.li-body{flex:1;min-width:0}
.li-main{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:10px;color:var(--text2);margin-top:2px;font-family:var(--mono)}
.li-right{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:8px}
.li-amount{font-family:var(--mono);font-size:12px;font-weight:700}
.li-amount.green{color:var(--green)}.li-amount.red{color:var(--red)}.li-amount.blue{color:var(--blue)}.li-amount.yellow{color:var(--yellow)}.li-amount.purple{color:var(--purple)}
.li-delete{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;font-size:15px}
.li-delete:active{color:var(--red)}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty svg{width:36px;height:36px;margin-bottom:10px;stroke:var(--text3)}
.empty p{font-size:12px;font-family:var(--mono)}
.overlay{position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%}
.modal{background:var(--bg2);border-top:1px solid var(--border);border-radius:22px 22px 0 0;padding:18px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:15px;font-family:var(--mono);font-weight:700;margin-bottom:16px;color:var(--text)}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{opacity:.85}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.dest-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.dest-btn{padding:12px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:var(--mono);font-size:12px;font-weight:700;transition:all 0.2s}
.dest-btn.wallet-active{border-color:var(--purple);color:var(--purple);background:#a29bfe15}
.dest-btn.bank-active{border-color:var(--blue);color:var(--blue);background:#0099ff15}
.type-toggle{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:12px}
.type-btn{flex:1;padding:7px;text-align:center;font-size:11px;font-family:var(--mono);font-weight:700;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--text2);transition:all 0.2s}
.type-btn.dep-active{background:#00d4aa22;color:var(--green)}
.type-btn.with-active{background:#ff6b6b22;color:var(--red)}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.cat-chip{padding:5px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);transition:all 0.2s}
.cat-chip.active{border-color:var(--accent);color:var(--accent);background:#00d4aa15}
.section-title{font-size:10px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;margin-top:2px}
.chart-wrap{position:relative;height:170px;margin-top:6px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.report-row:last-child{border-bottom:none}
.rr-label{font-size:11px;color:var(--text2);font-family:var(--mono)}
.rr-value{font-size:13px;font-family:var(--mono);font-weight:700}
.carry-badge{display:inline-flex;align-items:center;gap:4px;background:#00d4aa12;border:1px solid #00d4aa28;border-radius:20px;padding:3px 9px;font-size:9px;font-family:var(--mono);color:var(--accent);margin-bottom:10px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:9px 18px;border-radius:30px;font-family:var(--mono);font-size:11px;font-weight:700;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.flow-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;font-size:11px;color:var(--text2);font-family:var(--mono);line-height:1.8}
.flow-info span{color:var(--accent)}
.hint{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;border-left:2px solid var(--border)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">SalaryFlow ৳</div>
      <div class="header-sub" id="headerDate"></div>
    </div>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="headerMonth"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="page" id="mainPage"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goTo('dashboard')" id="nav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" onclick="goTo('salary')" id="nav-salary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 6v2m0 8v2M9 9h4.5a1.5 1.5 0 010 3h-3a1.5 1.5 0 000 3H15"/></svg>
      <span>Salary</span>
    </button>
    <button class="nav-btn" onclick="goTo('wallet')" id="nav-wallet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M16 12h5v4h-5a2 2 0 010-4z"/></svg>
      <span>Wallet</span>
    </button>
    <button class="nav-btn" onclick="goTo('bank')" id="nav-bank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>
      <span>Bank</span>
    </button>
    <button class="nav-btn" onclick="goTo('expenses')" id="nav-expenses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 14l-2-2 2-2M15 10l2 2-2 2"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      <span>Expenses</span>
    </button>
    <button class="nav-btn" onclick="goTo('reports')" id="nav-reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      <span>Reports</span>
    </button>
  </nav>
</div>
<div id="modalOverlay" class="overlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modalContent"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FMONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CATS=['Food','Transport','Shopping','Bills','Family','Others'];
const CCOLORS={Food:'#ff6b6b',Transport:'#0099ff',Shopping:'#ffd93d',Bills:'#ff9f43',Family:'#a29bfe',Others:'#00d4aa'};
const CICONS={Food:'🍽',Transport:'🚌',Shopping:'🛍',Bills:'💡',Family:'👨‍👩‍👧',Others:'📦'};

let db=(()=>{try{return JSON.parse(localStorage.getItem('sf_v3')||'{}');}catch(e){return{};}})();
let view='dashboard', curY=new Date().getFullYear(), curM=new Date().getMonth();

function saveDB(){localStorage.setItem('sf_v3',JSON.stringify(db));}
function mk(y,m){return `${y}-${String(m+1).padStart(2,'0')}`;}
function mdata(y,m){const k=mk(y,m);if(!db[k])db[k]={salaries:[],withdrawals:[],bankTx:[],expenses:[]};return db[k];}
function cd(){return mdata(curY,curM);}

// --- BALANCE LOGIC ---

function salaryCarry(y,m){
  // sum remaining salary from all months before (y,m)
  let carry=0;
  let ty=y,tm=m-1;
  if(tm<0){tm=11;ty--;}
  let chain=[];
  let ly=ty,lm=tm;
  for(let i=0;i<36;i++){
    if(!db[mk(ly,lm)])break;
    chain.unshift({y:ly,m:lm});
    lm--;if(lm<0){lm=11;ly--;}
  }
  for(const {y:my,m:mm} of chain){
    const d=mdata(my,mm);
    const s=d.salaries.reduce((a,x)=>a+x.amount,0);
    const w=d.withdrawals.reduce((a,x)=>a+x.amount,0);
    carry=Math.max(0,carry+s-w);
  }
  return carry;
}

function salaryBalance(){
  const d=cd();
  return Math.max(0, salaryCarry(curY,curM)+d.salaries.reduce((a,x)=>a+x.amount,0)-d.withdrawals.reduce((a,x)=>a+x.amount,0));
}

function walletBalance(upY,upM){
  // All-time wallet balance up to (upY, upM)
  let bal=0;
  for(const k of Object.keys(db).sort()){
    const [ky,km1]=k.split('-').map(Number),km=km1-1;
    if(ky>upY||(ky===upY&&km>upM))break;
    const d=db[k];
    // IN: salary withdrawals to wallet
    (d.withdrawals||[]).forEach(w=>{if(w.dest==='wallet')bal+=w.amount;});
    // IN: bank withdrawals (always to wallet)
    (d.bankTx||[]).forEach(t=>{if(t.type==='withdrawal')bal+=t.amount;});
    // OUT: expenses
    (d.expenses||[]).forEach(e=>{bal-=e.amount;});
  }
  return bal;
}

function bankBalance(upY,upM){
  let bal=0;
  for(const k of Object.keys(db).sort()){
    const [ky,km1]=k.split('-').map(Number),km=km1-1;
    if(ky>upY||(ky===upY&&km>upM))break;
    const d=db[k];
    // IN: salary withdrawals to bank
    (d.withdrawals||[]).forEach(w=>{if(w.dest==='bank')bal+=w.amount;});
    // IN: direct bank deposits
    // OUT: bank withdrawals (go to wallet)
    (d.bankTx||[]).forEach(t=>{bal+=(t.type==='deposit'?t.amount:-t.amount);});
  }
  return bal;
}

function fmt(n){if(Math.abs(n)>=100000)return '৳'+(n/100000).toFixed(1)+'L';if(Math.abs(n)>=1000)return '৳'+(n/1000).toFixed(1)+'k';return '৳'+Math.round(n).toLocaleString();}
function fmtF(n){return '৳'+Math.round(n||0).toLocaleString();}
function fmtD(s){return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}

function goTo(v){view=v;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+v).classList.add('active');render();}
function changeMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}render();}

function render(){
  const now=new Date();
  document.getElementById('headerDate').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('headerMonth').textContent=MONTHS[curM]+' '+curY;
  const p=document.getElementById('mainPage');p.scrollTop=0;
  if(view==='dashboard')p.innerHTML=vDashboard();
  else if(view==='salary')p.innerHTML=vSalary();
  else if(view==='wallet')p.innerHTML=vWallet();
  else if(view==='bank')p.innerHTML=vBank();
  else if(view==='expenses')p.innerHTML=vExpenses();
  else if(view==='reports'){p.innerHTML=vReports();setTimeout(drawCharts,60);}
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function vDashboard(){
  const d=cd();
  const salBal=salaryBalance();
  const walBal=walletBalance(curY,curM);
  const bankBal=bankBalance(curY,curM);
  const carry=salaryCarry(curY,curM);
  const thisSal=d.salaries.reduce((a,x)=>a+x.amount,0);
  const thisWith=d.withdrawals.reduce((a,x)=>a+x.amount,0);
  const expenses=d.expenses.reduce((a,x)=>a+x.amount,0);
  const totalAvail=carry+thisSal;
  const wp=totalAvail>0?Math.min(100,(thisWith/totalAvail)*100):0;
  const catTotals={};CATS.forEach(c=>catTotals[c]=0);
  d.expenses.forEach(e=>catTotals[e.category]=(catTotals[e.category]||0)+e.amount);
  const top=Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,3);

  return `
  <div class="hero-card green-hero">
    <div class="hero-glow" style="background:radial-gradient(circle,#00d4aa18,transparent 70%)"></div>
    <div class="hero-label" style="color:var(--accent)">Salary Balance</div>
    <div class="hero-amount" style="color:var(--accent)">${fmtF(salBal)}</div>
    <div class="hero-meta"><span>Added: ${fmt(totalAvail)}</span><span>Withdrawn: ${fmt(thisWith)}</span></div>
    ${carry>0?`<div style="margin-top:8px"><div class="carry-badge">↩ Carried: ${fmtF(carry)}</div></div>`:''}
    <div class="progress-wrap">
      <div class="progress-label"><span>Withdrawn</span><span>${wp.toFixed(0)}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="background:var(--yellow);width:${wp}%"></div></div>
    </div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">👜 Wallet</div><div class="stat-value purple">${fmt(walBal)}</div><div class="stat-sub">Cash in hand</div></div>
    <div class="stat-card"><div class="stat-label">🏦 Bank</div><div class="stat-value blue">${fmt(bankBal)}</div><div class="stat-sub">Saved</div></div>
    <div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-value red">${fmt(expenses)}</div><div class="stat-sub">From wallet</div></div>
    <div class="stat-card"><div class="stat-label">Withdrawals</div><div class="stat-value yellow">${fmt(thisWith)}</div><div class="stat-sub">${d.withdrawals.length} time${d.withdrawals.length===1?'':'s'}</div></div>
  </div>
  ${top.length>0?`<div class="card"><div class="card-header"><div class="card-title">Top Spending</div></div>${top.map(([c,a])=>`<div class="list-item"><div class="li-icon" style="background:${CCOLORS[c]}22">${CICONS[c]}</div><div class="li-body"><div class="li-main">${c}</div></div><div class="li-right"><div class="li-amount red">${fmtF(a)}</div></div></div>`).join('')}</div>`:''}
  <div class="flow-info">
    💡 <span>Salary</span> → withdraw to <span>Wallet</span> or <span>Bank</span><br>
    &nbsp;&nbsp;&nbsp;&nbsp;<span>Bank</span> → withdraw → always to <span>Wallet</span><br>
    &nbsp;&nbsp;&nbsp;&nbsp;<span>Wallet</span> → pay all <span>Expenses</span>
  </div>`;
}

// ── SALARY ────────────────────────────────────────────────────────────────────
function vSalary(){
  const d=cd();
  const carry=salaryCarry(curY,curM);
  const thisSal=d.salaries.reduce((a,x)=>a+x.amount,0);
  const thisWith=d.withdrawals.reduce((a,x)=>a+x.amount,0);
  const toWallet=d.withdrawals.filter(w=>w.dest==='wallet').reduce((a,x)=>a+x.amount,0);
  const toBank=d.withdrawals.filter(w=>w.dest==='bank').reduce((a,x)=>a+x.amount,0);

  return `
  <div class="hero-card green-hero">
    <div class="hero-glow" style="background:radial-gradient(circle,#00d4aa18,transparent 70%)"></div>
    <div class="hero-label" style="color:var(--accent)">Remaining Salary</div>
    <div class="hero-amount" style="color:var(--accent)">${fmtF(salaryBalance())}</div>
    <div class="hero-meta"><span>This month: ${fmt(thisSal)}</span>${carry>0?`<span>+Carry: ${fmt(carry)}</span>`:''}</div>
  </div>
  ${thisWith>0?`<div class="stat-grid"><div class="stat-card"><div class="stat-label">→ To Wallet</div><div class="stat-value purple">${fmt(toWallet)}</div></div><div class="stat-card"><div class="stat-label">→ To Bank</div><div class="stat-value blue">${fmt(toBank)}</div></div></div>`:''}
  <div class="card">
    <div class="card-header"><div class="card-title">Salary Entries</div><button class="card-action" onclick="openModal('addSalary')">+ Add</button></div>
    ${d.salaries.length===0?`<div class="empty"><p>No salary added yet</p></div>`:d.salaries.map((s,i)=>`
    <div class="list-item">
      <div class="li-icon" style="background:#00d4aa22">💰</div>
      <div class="li-body"><div class="li-main">${s.note||'Salary'}</div><div class="li-sub">${fmtD(s.date)}</div></div>
      <div class="li-right"><div class="li-amount green">+${fmtF(s.amount)}</div><button class="li-delete" onclick="delItem('salaries',${i})">×</button></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Withdrawals</div><button class="card-action" onclick="openModal('addWithdrawal')">+ Withdraw</button></div>
    ${d.withdrawals.length===0?`<div class="empty"><p>No withdrawals yet</p></div>`:d.withdrawals.map((w,i)=>`
    <div class="list-item">
      <div class="li-icon" style="background:${w.dest==='wallet'?'#a29bfe22':'#0099ff22'}">${w.dest==='wallet'?'👜':'🏦'}</div>
      <div class="li-body"><div class="li-main">${w.note||'Withdrawal'}</div><div class="li-sub">${fmtD(w.date)} · to ${w.dest==='wallet'?'Wallet':'Bank'}</div></div>
      <div class="li-right"><div class="li-amount yellow">-${fmtF(w.amount)}</div><button class="li-delete" onclick="delItem('withdrawals',${i})">×</button></div>
    </div>`).join('')}
  </div>`;
}

// ── WALLET ────────────────────────────────────────────────────────────────────
function vWallet(){
  const d=cd();
  const walBal=walletBalance(curY,curM);
  const txs=[];
  d.withdrawals.forEach(w=>{if(w.dest==='wallet')txs.push({in:true,label:'From Salary',note:w.note,amount:w.amount,date:w.date,icon:'💰',color:'green'});});
  d.bankTx.forEach(t=>{if(t.type==='withdrawal')txs.push({in:true,label:'From Bank',note:t.note,amount:t.amount,date:t.date,icon:'🏦',color:'blue'});});
  d.expenses.forEach(e=>txs.push({in:false,label:e.category,note:e.description,amount:e.amount,date:e.date,icon:CICONS[e.category]||'📦',color:'red'}));
  txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const mIn=txs.filter(t=>t.in).reduce((a,t)=>a+t.amount,0);
  const mOut=txs.filter(t=>!t.in).reduce((a,t)=>a+t.amount,0);

  return `
  <div class="hero-card purple-hero">
    <div class="hero-glow" style="background:radial-gradient(circle,#a29bfe18,transparent 70%)"></div>
    <div class="hero-label" style="color:var(--purple)">Wallet Balance</div>
    <div class="hero-amount" style="color:var(--purple)">${fmtF(walBal)}</div>
    <div class="hero-meta"><span>In this month: ${fmt(mIn)}</span><span>Spent: ${fmt(mOut)}</span></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Wallet History — ${MONTHS[curM]}</div></div>
    ${txs.length===0?`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M16 12h5v4h-5a2 2 0 010-4z"/></svg>
      <p>No wallet activity</p><p style="margin-top:5px;font-size:10px">Withdraw salary to wallet to start</p>
    </div>`:txs.map(t=>`
    <div class="list-item">
      <div class="li-icon" style="background:${t.in?'#00d4aa15':'#ff6b6b15'}">${t.icon}</div>
      <div class="li-body"><div class="li-main">${t.note||t.label}</div><div class="li-sub">${t.label} · ${fmtD(t.date)}</div></div>
      <div class="li-right"><div class="li-amount ${t.color}">${t.in?'+':'-'}${fmtF(t.amount)}</div></div>
    </div>`).join('')}
  </div>`;
}

// ── BANK ──────────────────────────────────────────────────────────────────────
function vBank(){
  const d=cd();
  const bankBal=bankBalance(curY,curM);
  const fromSal=d.withdrawals.filter(w=>w.dest==='bank').reduce((a,w)=>a+w.amount,0);
  const mDep=d.bankTx.filter(t=>t.type==='deposit').reduce((a,t)=>a+t.amount,0);
  const mWith=d.bankTx.filter(t=>t.type==='withdrawal').reduce((a,t)=>a+t.amount,0);
  const txs=[];
  d.withdrawals.forEach(w=>{if(w.dest==='bank')txs.push({dep:true,label:'From Salary',note:w.note,amount:w.amount,date:w.date,icon:'💰'});});
  d.bankTx.forEach((t,i)=>txs.push({dep:t.type==='deposit',label:t.type==='deposit'?'Deposit':'→ Wallet',note:t.note,amount:t.amount,date:t.date,icon:t.type==='deposit'?'📥':'👜',idx:i}));
  txs.sort((a,b)=>new Date(b.date)-new Date(a.date));

  return `
  <div class="hero-card blue-hero">
    <div class="hero-glow" style="background:radial-gradient(circle,#0099ff18,transparent 70%)"></div>
    <div class="hero-label" style="color:var(--blue)">Bank Balance</div>
    <div class="hero-amount" style="color:var(--blue)">${fmtF(bankBal)}</div>
    <div class="hero-meta"><span>In: ${fmt(fromSal+mDep)}</span><span>Out→Wallet: ${fmt(mWith)}</span></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Bank Transactions</div><button class="card-action" onclick="openModal('addBank')">+ Add</button></div>
    ${txs.length===0?`<div class="empty"><p>No bank transactions</p></div>`:txs.map(t=>`
    <div class="list-item">
      <div class="li-icon" style="background:${t.dep?'#0099ff22':'#a29bfe22'}">${t.icon}</div>
      <div class="li-body"><div class="li-main">${t.note||t.label}</div><div class="li-sub">${t.label} · ${fmtD(t.date)}</div></div>
      <div class="li-right">
        <div class="li-amount ${t.dep?'blue':'purple'}">${t.dep?'+':'-'}${fmtF(t.amount)}</div>
        ${t.idx!==undefined?`<button class="li-delete" onclick="delItem('bankTx',${t.idx})">×</button>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

// ── EXPENSES ──────────────────────────────────────────────────────────────────
function vExpenses(){
  const d=cd();
  const walBal=walletBalance(curY,curM);
  const total=d.expenses.reduce((a,x)=>a+x.amount,0);
  const catTotals={};CATS.forEach(c=>catTotals[c]=0);
  d.expenses.forEach(e=>catTotals[e.category]=(catTotals[e.category]||0)+e.amount);

  return `
  <div class="hero-card red-hero">
    <div class="hero-glow" style="background:radial-gradient(circle,#ff6b6b18,transparent 70%)"></div>
    <div class="hero-label" style="color:var(--red)">Total Expenses</div>
    <div class="hero-amount" style="color:var(--red)">${fmtF(total)}</div>
    <div class="hero-meta"><span>${d.expenses.length} transactions</span><span>Wallet left: ${fmt(walBal)}</span></div>
  </div>
  ${CATS.filter(c=>catTotals[c]>0).length>0?`<div class="card"><div class="card-header"><div class="card-title">By Category</div></div>${CATS.filter(c=>catTotals[c]>0).map(cat=>`
  <div class="list-item">
    <div class="li-icon" style="background:${CCOLORS[cat]}22">${CICONS[cat]}</div>
    <div class="li-body"><div class="li-main">${cat}</div>
      <div class="progress-wrap" style="margin-top:4px"><div class="progress-bar"><div class="progress-fill" style="background:${CCOLORS[cat]};width:${total>0?(catTotals[cat]/total*100).toFixed(0):0}%"></div></div></div>
    </div>
    <div class="li-right"><div class="li-amount red">${fmtF(catTotals[cat])}</div></div>
  </div>`).join('')}</div>`:''}
  <div class="card">
    <div class="card-header"><div class="card-title">All Expenses</div><button class="card-action" onclick="openModal('addExpense')">+ Add</button></div>
    ${d.expenses.length===0?`<div class="empty"><p>No expenses recorded</p></div>`:[...d.expenses].reverse().map((e,ri)=>{
      const i=d.expenses.length-1-ri;
      return `<div class="list-item">
        <div class="li-icon" style="background:${CCOLORS[e.category]||'#ff6b6b'}22">${CICONS[e.category]||'📦'}</div>
        <div class="li-body"><div class="li-main">${e.description||e.category}</div><div class="li-sub">${e.category} · ${fmtD(e.date)}</div></div>
        <div class="li-right"><div class="li-amount red">-${fmtF(e.amount)}</div><button class="li-delete" onclick="delItem('expenses',${i})">×</button></div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function vReports(){
  const d=cd();
  const carry=salaryCarry(curY,curM);
  const thisSal=d.salaries.reduce((a,x)=>a+x.amount,0);
  const thisWith=d.withdrawals.reduce((a,x)=>a+x.amount,0);
  const toWallet=d.withdrawals.filter(w=>w.dest==='wallet').reduce((a,x)=>a+x.amount,0);
  const toBank=d.withdrawals.filter(w=>w.dest==='bank').reduce((a,x)=>a+x.amount,0);
  const expenses=d.expenses.reduce((a,x)=>a+x.amount,0);
  const walBal=walletBalance(curY,curM);
  const bankBal=bankBalance(curY,curM);

  return `
  <div class="section-title">${FMONTHS[curM]} ${curY} Summary</div>
  <div class="card">
    <div class="report-row"><span class="rr-label">Carry Forward</span><span class="rr-value" style="color:var(--accent)">${fmtF(carry)}</span></div>
    <div class="report-row"><span class="rr-label">Salary Added</span><span class="rr-value" style="color:var(--green)">${fmtF(thisSal)}</span></div>
    <div class="report-row"><span class="rr-label">Total Available</span><span class="rr-value" style="color:var(--accent)">${fmtF(carry+thisSal)}</span></div>
    <div class="report-row"><span class="rr-label">Withdrawn (total)</span><span class="rr-value" style="color:var(--yellow)">-${fmtF(thisWith)}</span></div>
    <div class="report-row"><span class="rr-label">&nbsp;↳ To Wallet</span><span class="rr-value" style="color:var(--purple)">${fmtF(toWallet)}</span></div>
    <div class="report-row"><span class="rr-label">&nbsp;↳ To Bank</span><span class="rr-value" style="color:var(--blue)">${fmtF(toBank)}</span></div>
    <div class="report-row"><span class="rr-label">Expenses (from wallet)</span><span class="rr-value" style="color:var(--red)">-${fmtF(expenses)}</span></div>
    <div class="report-row"><span class="rr-label">Salary Balance Left</span><span class="rr-value" style="color:var(--accent)">${fmtF(salaryBalance())}</span></div>
    <div class="report-row"><span class="rr-label">Wallet Balance</span><span class="rr-value" style="color:var(--purple)">${fmtF(walBal)}</span></div>
    <div class="report-row"><span class="rr-label">Bank Balance</span><span class="rr-value" style="color:var(--blue)">${fmtF(bankBal)}</span></div>
  </div>
  <div class="section-title">6-Month Salary vs Withdrawals</div>
  <div class="card"><div class="chart-wrap"><canvas id="chartSalary"></canvas></div></div>
  <div class="section-title">Expenses Trend</div>
  <div class="card"><div class="chart-wrap"><canvas id="chartExpenses"></canvas></div></div>
  <div class="section-title">Wallet & Bank Balances</div>
  <div class="card"><div class="chart-wrap"><canvas id="chartBalances"></canvas></div></div>`;
}

function drawCharts(){
  const months=[];
  for(let i=5;i>=0;i--){let m=curM-i,y=curY;while(m<0){m+=12;y--;}months.push({y,m,label:MONTHS[m]});}
  const labels=months.map(x=>x.label);
  const sals=months.map(({y,m})=>mdata(y,m).salaries.reduce((a,x)=>a+x.amount,0));
  const withs=months.map(({y,m})=>mdata(y,m).withdrawals.reduce((a,x)=>a+x.amount,0));
  const exps=months.map(({y,m})=>mdata(y,m).expenses.reduce((a,x)=>a+x.amount,0));
  const wals=months.map(({y,m})=>Math.max(0,walletBalance(y,m)));
  const banks=months.map(({y,m})=>Math.max(0,bankBalance(y,m)));
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7b8098',font:{family:'Space Mono',size:9},boxWidth:10}}},scales:{x:{ticks:{color:'#7b8098',font:{family:'Space Mono',size:9}},grid:{color:'#1e2230'}},y:{ticks:{color:'#7b8098',font:{family:'Space Mono',size:9},callback:v=>fmt(v)},grid:{color:'#1e2230'}}}};
  new Chart(document.getElementById('chartSalary'),{type:'bar',data:{labels,datasets:[{label:'Salary',data:sals,backgroundColor:'#00d4aa44',borderColor:'#00d4aa',borderWidth:1.5,borderRadius:3},{label:'Withdrawn',data:withs,backgroundColor:'#ffd93d44',borderColor:'#ffd93d',borderWidth:1.5,borderRadius:3}]},options:o});
  new Chart(document.getElementById('chartExpenses'),{type:'bar',data:{labels,datasets:[{label:'Expenses',data:exps,backgroundColor:'#ff6b6b44',borderColor:'#ff6b6b',borderWidth:1.5,borderRadius:3}]},options:o});
  new Chart(document.getElementById('chartBalances'),{type:'line',data:{labels,datasets:[{label:'Wallet',data:wals,borderColor:'#a29bfe',backgroundColor:'#a29bfe22',borderWidth:2,pointBackgroundColor:'#a29bfe',fill:true,tension:0.4},{label:'Bank',data:banks,borderColor:'#0099ff',backgroundColor:'#0099ff22',borderWidth:2,pointBackgroundColor:'#0099ff',fill:true,tension:0.4}]},options:o});
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(type){
  const today=new Date().toISOString().slice(0,10);
  let c='';
  if(type==='addSalary'){
    c=`<div class="modal-title">Add Salary</div>
    <div class="field"><label>Amount (৳)</label><input type="number" id="m_amount" placeholder="0" inputmode="decimal"/></div>
    <div class="field"><label>Date</label><input type="date" id="m_date" value="${today}"/></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="m_note" placeholder="e.g. Monthly salary"/></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveSalary()">Save</button></div>`;

  } else if(type==='addWithdrawal'){
    c=`<div class="modal-title">Withdraw from Salary</div>
    <div class="field"><label>Amount (৳)</label><input type="number" id="m_amount" placeholder="0" inputmode="decimal"/></div>
    <div class="field"><label>Where does this money go?</label>
      <div class="dest-toggle">
        <button class="dest-btn wallet-active" id="destW" onclick="setDest('wallet')">👜 To Wallet</button>
        <button class="dest-btn" id="destB" onclick="setDest('bank')">🏦 To Bank</button>
      </div>
      <input type="hidden" id="m_dest" value="wallet"/>
    </div>
    <div class="field"><label>Date</label><input type="date" id="m_date" value="${today}"/></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="m_note" placeholder="e.g. Weekly cash"/></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveWithdrawal()">Withdraw</button></div>`;

  } else if(type==='addBank'){
    c=`<div class="modal-title">Bank Transaction</div>
    <div class="type-toggle">
      <button class="type-btn dep-active" id="typeD" onclick="setBType('deposit')">↑ Deposit</button>
      <button class="type-btn" id="typeW" onclick="setBType('withdrawal')">↓ Withdraw → Wallet</button>
    </div>
    <input type="hidden" id="m_type" value="deposit"/>
    <div class="field" id="srcField"><label>Source</label>
      <select id="m_source"><option value="other">Other (Gift / Transfer / etc.)</option><option value="salary">From Salary</option></select>
    </div>
    <div class="hint" id="bankHint" style="display:none">💡 Bank withdrawal will be added to your Wallet</div>
    <div class="field"><label>Amount (৳)</label><input type="number" id="m_amount" placeholder="0" inputmode="decimal"/></div>
    <div class="field"><label>Date</label><input type="date" id="m_date" value="${today}"/></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="m_note" placeholder=""/></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBankTx()">Save</button></div>`;

  } else if(type==='addExpense'){
    c=`<div class="modal-title">Add Expense</div>
    <div class="hint">💡 Deducted from your Wallet balance</div>
    <div class="field"><label>Amount (৳)</label><input type="number" id="m_amount" placeholder="0" inputmode="decimal"/></div>
    <div class="field"><label>Category</label>
      <div class="cat-chips">${CATS.map((cat,i)=>`<div class="cat-chip${i===0?' active':''}" onclick="selCat(this,'${cat}')">${CICONS[cat]} ${cat}</div>`).join('')}</div>
      <input type="hidden" id="m_cat" value="Food"/>
    </div>
    <div class="field"><label>Date</label><input type="date" id="m_date" value="${today}"/></div>
    <div class="field"><label>Description (optional)</label><input type="text" id="m_note" placeholder="e.g. Lunch"/></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveExpense()">Save</button></div>`;
  }
  document.getElementById('modalContent').innerHTML=c;
  document.getElementById('modalOverlay').style.display='flex';
  setTimeout(()=>{const el=document.getElementById('m_amount');if(el)el.focus();},100);
}

function setDest(d){
  document.getElementById('m_dest').value=d;
  document.getElementById('destW').className='dest-btn'+(d==='wallet'?' wallet-active':'');
  document.getElementById('destB').className='dest-btn'+(d==='bank'?' bank-active':'');
}

function setBType(t){
  document.getElementById('m_type').value=t;
  document.getElementById('typeD').className='type-btn'+(t==='deposit'?' dep-active':'');
  document.getElementById('typeW').className='type-btn'+(t==='withdrawal'?' with-active':'');
  const sf=document.getElementById('srcField');
  const bh=document.getElementById('bankHint');
  if(sf)sf.style.display=t==='deposit'?'block':'none';
  if(bh)bh.style.display=t==='withdrawal'?'block':'none';
}

function selCat(el,cat){
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('m_cat').value=cat;
}

function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function saveSalary(){
  const a=parseFloat(gv('m_amount'));if(!a||a<=0){toast('Enter a valid amount');return;}
  cd().salaries.push({amount:a,date:gv('m_date'),note:gv('m_note')});
  saveDB();closeModal();render();toast('Salary added ✓');
}

function saveWithdrawal(){
  const a=parseFloat(gv('m_amount'));if(!a||a<=0){toast('Enter a valid amount');return;}
  const dest=gv('m_dest')||'wallet';
  cd().withdrawals.push({amount:a,dest,date:gv('m_date'),note:gv('m_note')});
  saveDB();closeModal();render();toast(`Withdrawn → ${dest==='wallet'?'Wallet 👜':'Bank 🏦'} ✓`);
}

function saveBankTx(){
  const a=parseFloat(gv('m_amount'));if(!a||a<=0){toast('Enter a valid amount');return;}
  const type=gv('m_type');
  cd().bankTx.push({type,amount:a,source:gv('m_source')||'other',date:gv('m_date'),note:gv('m_note')});
  saveDB();closeModal();render();toast(type==='deposit'?'Deposit saved ✓':'Withdrawn → Wallet ✓');
}

function saveExpense(){
  const a=parseFloat(gv('m_amount'));if(!a||a<=0){toast('Enter a valid amount');return;}
  cd().expenses.push({amount:a,category:gv('m_cat'),date:gv('m_date'),description:gv('m_note')});
  saveDB();closeModal();render();toast('Expense saved ✓');
}

function delItem(list,i){
  if(!confirm('Delete this entry?'))return;
  cd()[list].splice(i,1);saveDB();render();toast('Deleted');
}

let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
render();
</script>
</body>
</html>
